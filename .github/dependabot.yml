version: 2
updates:
  # Enable version updates for Docker
  - package-ecosystem: "docker"
    directory: "/db"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/docs"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/tests"
    schedule:
      interval: "weekly"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
